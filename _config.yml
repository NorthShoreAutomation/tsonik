title: Tsonik
description: TypeScript client library for the Iconik API
url: "https://northshoreautomation.github.io"
baseurl: "/tsonik"

# Build settings
markdown: kramdown
highlighter: rouge
remote_theme: pages-themes/cayman@v0.2.0
plugins:
- jekyll-remote-theme

# Navigation order
header_pages:
  - index.md
  - docs/getting-started.md
  - docs/examples.md
  - docs/api-reference.md
  - docs/best-practices.md

# Exclude from processing
exclude:
  - node_modules/
  - dist/
  - .env
  - package*.json
  - tsconfig.json
  - jest.config.js
  - .eslintrc.js
  - dev-docs/
  - CLAUDE.md
  - examples/