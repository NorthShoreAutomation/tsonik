name: Unit Tests with Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests with Coverage
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install Dependencies
      run: npm ci
    
    - name: Run Unit Tests with Coverage
      run: npm run test:unit -- --coverage
      env:
        ICONIK_APP_ID: ${{ secrets.ICONIK_APP_ID }}
        ICONIK_AUTH_TOKEN: ${{ secrets.ICONIK_AUTH_TOKEN }}
        ICONIK_BASE_URL: ${{ secrets.ICONIK_BASE_URL }}
    
    - name: Verify resource files coverage
      run: |
        echo "Checking resource files coverage..."
        # Run tests with coverage and capture output  
        coverage_output=$(npx jest --coverage --testPathIgnorePatterns=".*integration.*" 2>/dev/null)
        
        # Extract resource files coverage from the detailed table (field 3 for statements)
        resources_coverage=$(echo "$coverage_output" | grep "src/resources" | head -1 | awk '{print $3}')
        
        echo "Full coverage output:"
        echo "$coverage_output"
        echo "Extracted resources coverage: ${resources_coverage}%"
        
        if [[ -z "$resources_coverage" ]] || [[ $resources_coverage -lt 90 ]]; then
          echo "❌ Resource files coverage is below 90% or could not be determined"
          exit 1
        else
          echo "✅ Resource files coverage is ${resources_coverage}% - meets requirement!"
        fi
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        directory: ./coverage/
        fail_ci_if_error: true
