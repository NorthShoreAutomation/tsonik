name: Publish to NPM

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
        env:
          ICONIK_APP_ID: ${{ secrets.ICONIK_APP_ID }}
          ICONIK_AUTH_TOKEN: ${{ secrets.ICONIK_AUTH_TOKEN }}
          ICONIK_BASE_URL: ${{ secrets.ICONIK_BASE_URL }}
      
      - name: Build
        run: npm run build
      
      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
