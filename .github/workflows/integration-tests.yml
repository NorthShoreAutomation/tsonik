name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install Dependencies
      run: npm ci
    
    - name: Run Integration Tests
      run: npm run test:integration
      env:
        ICONIK_APP_ID: ${{ secrets.ICONIK_APP_ID }}
        ICONIK_AUTH_TOKEN: ${{ secrets.ICONIK_AUTH_TOKEN }}
        ICONIK_BASE_URL: ${{ secrets.ICONIK_BASE_URL }}
        ICONIK_ALLOW_DESTRUCTIVE_TESTS: ${{ secrets.ICONIK_ALLOW_DESTRUCTIVE_TESTS || 'false' }}
