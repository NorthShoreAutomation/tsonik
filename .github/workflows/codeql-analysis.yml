# CodeQL Analysis - Disabled for private repository
# GitHub Advanced Security required for CodeQL on private repos
# To re-enable: upgrade to GitHub Team/Enterprise or make repo public

name: "CodeQL Analysis"

on:
  # Temporarily disabled - uncomment when Advanced Security is available
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  # schedule:
  #   - cron: '0 0 * * 0' # Run once a week (Sunday at midnight)

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript-typescript

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
